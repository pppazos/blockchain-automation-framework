apiVersion: helm.fluxcd.io/v1
kind: HelmRelease
metadata:
  name: warehousewarehousequroum
  namespace: warehouse-quo
  annotations:
    fluxcd.io/automated: "false"
spec:
  releaseName: warehousewarehousequroum
  helmVersion: v3
  chart:
    git: ssh://git@github.com/pppazos/blockchain-automation-framework.git
    ref: dev2
    path: platforms/quorum/charts/node_quorum  
  values:
    replicaCount: 1
    metadata:
      namespace: warehouse-quo
      labels:
    images:
      node: quorumengineering/quorum:21.4.2
      alpineutils: index.docker.io/hyperledgerlabs/alpine-utils:1.0
      tessera: quorumengineering/tessera:21.4.0
      busybox: busybox
      mysql: mysql/mysql-server:5.7
    node:
      name: warehouse
      status: default
      consensus: ibft
      subject: O=Warehouse,OU=Warehouse,L=42.36/-71.06/Boston,C=US
      mountPath: /etc/quorum/qdata
      imagePullSecret: regcred
      keystore: keystore_1
      
      servicetype: ClusterIP
      lock: false
      ports:
        rpc: 8546
        raft: 50401
        tm: 443
        quorum: 21000
        db: 3306
      dbname: demodb
      mysqluser: demouser
    vault:
      address: http://vault.internal.dev2.aws.blockchaincloudpoc-develop.com:20001
      secretprefix: secretsv2/data/warehouse-quo/crypto/warehouse
      serviceaccountname: vault-auth
      keyname: quorum
      tm_keyname: transaction
      role: vault-role
      authpath: quorumwarehouse
    tessera:
      dburl: "jdbc:mysql://warehouse-tessera:3306/demodb"
      dbusername: demouser
      url: "https://warehouse.test.quorum.blockchaincloudpoc-develop.com:443"
      clienturl: "http://warehouse-tessera:8888" #TODO: Enable tls strict for q2t
      othernodes:
        - url: https://carrier.test.quorum.blockchaincloudpoc-develop.com
        - url: https://manufacturer.test.quorum.blockchaincloudpoc-develop.com
        - url: https://store.test.quorum.blockchaincloudpoc-develop.com
        - url: https://warehouse.test.quorum.blockchaincloudpoc-develop.com
      tls: "STRICT"
      trust: "TOFU"
    genesis: 
    staticnodes: 
      [
    "enode://a2bb5b34fb2ce088cede8d22383a831b1d2558d20371c3f2f9573687449b92bede2dcb42cd86a846e266792caf9076c8e7f4f6a29cbebcb0352e62c30fd5997d@carrier.test.quorum.blockchaincloudpoc-develop.com:15010?discport=0",
    "enode://fdad7d83e2e8e13f7fd3c2bdd94e96fc23bbdacde523dbeb10cc5fb72243787d67e8c11a4a91a93c66b99bd987968873ed34d36a6215f494a7821f5f509f7424@manufacturer.test.quorum.blockchaincloudpoc-develop.com:15020?discport=0",
    "enode://837b9adb2297b1dc32cad593bc790d6321d840fb05485dfcacf4c6c37ecc36dde18de9492e48f6deb1228161187c398146953d8226fe3f0f140c1406bc4cdedd@store.test.quorum.blockchaincloudpoc-develop.com:15030?discport=0",
    "enode://486e3b2f26248738f9c3b94f8c49ea21d17a97988a38856ca7f677213f621560b9d695dfc3a755792d3c05a4136e0bab1f7d1724b101ead312d98b4c2c1360cf@warehouse.test.quorum.blockchaincloudpoc-develop.com:15040?discport=0"
]
    proxy:
      provider: "ambassador"
      external_url: warehouse.test.quorum.blockchaincloudpoc-develop.com
      portTM: 443
      rpcport: 15041
      quorumport: 15040
    storage:
      storageclassname: awsstorageclass
      storagesize: 1Gi
      dbstorage: 1Gi
